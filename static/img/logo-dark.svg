<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">

  <!-- Dark background, sharp enterprise corners -->
  <rect width="40" height="40" rx="3" fill="#0a0f1e"/>

  <!-- Input tick — left side -->
  <line x1="4" y1="13" x2="10" y2="13" stroke="#334155" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Top node — dim, inactive -->
  <rect x="10" y="9" width="20" height="8" rx="1.5" fill="#1e293b"/>

  <!-- Connector top → mid -->
  <line x1="20" y1="17" x2="20" y2="21" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Mid node — active, indigo accent -->
  <rect x="8" y="21" width="24" height="9" rx="1.5" fill="#4f46e5"/>
  <!-- Subtle inner highlight line on mid node -->
  <line x1="11" y1="24" x2="29" y2="24" stroke="#6366f1" stroke-width="1" stroke-linecap="round"/>

  <!-- Connector mid → bottom -->
  <line x1="20" y1="30" x2="20" y2="34" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Bottom node — dim, inactive -->
  <rect x="10" y="34" width="20" height="8" rx="1.5" fill="#1e293b"/>

  <!-- Output arrow — right side -->
  <line x1="30" y1="36" x2="36" y2="36" stroke="#334155" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="33,33 37,36 33,39" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/>

</svg>
