{
  "openapi": "3.1.0",
  "info": {
    "title": "Memintel Backend API",
    "version": "1.0.0"
  },
  "paths": {
    "/evaluate/full": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Execute concept + condition + action pipeline",
        "description": "Run the full ψ → φ → α pipeline for a given entity.\n\nExecutes the concept (ψ), evaluates the condition (φ), and dispatches\nbound actions (α). Fully deterministic when timestamp is provided.\n\nactions_triggered[] is nested inside decision (DecisionResult), not at\nthe top level of FullPipelineResult — this is a hard API contract.\n\ndry_run=True simulates the pipeline without firing actions.\nexplain=True populates result.explanation with per-node trace.\n\nHTTP 404 — concept, condition, or entity not found.\nHTTP 408 — execution timeout.\nHTTP 422 — execution error (missing data, null propagation).",
        "operationId": "evaluate_full_evaluate_full_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/EvaluateFullRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/FullPipelineResult"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/evaluate/condition": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Evaluate a condition for one entity",
        "description": "Run the φ layer (condition evaluation) for a single entity.\n\nReturns a DecisionResult with decision_value, strategy details, and any\nactions_triggered. The concept must be cached or the service will fetch\nprimitives and execute the ψ layer first.\n\nHTTP 404 — condition or entity not found.\nHTTP 408 — execution timeout.",
        "operationId": "evaluate_condition_evaluate_condition_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/EvaluateConditionRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/DecisionResult"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/evaluate/condition/batch": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Evaluate a condition for multiple entities",
        "description": "Run condition evaluation (φ layer) for N entities in a single call.\n\nAlways returns HTTP 200. Per-entity failures are captured inside each\nDecisionResult rather than failing the entire batch.\n\nReturns results in the same order as the input entities list.",
        "operationId": "evaluate_condition_batch_evaluate_condition_batch_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/EvaluateConditionBatchRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "items": {
                    "$ref": "#/components/schemas/DecisionResult"
                  },
                  "type": "array",
                  "title": "Response Evaluate Condition Batch Evaluate Condition Batch Post"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute/batch": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Execute concept for multiple entities",
        "description": "Run concept execution for N entities against the same (id, version).\n\nAlways returns HTTP 200. Per-entity failures are reported in\nBatchExecuteItem.error — they do not fail the whole batch.\n\nReturns results in input order. total and failed counters allow callers\nto detect partial failure without inspecting each item.",
        "operationId": "execute_batch_execute_batch_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExecuteBatchRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BatchExecuteResult"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute/range": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Execute concept over a time range",
        "description": "Run concept execution for one entity across a closed time range.\n\nReturns one ConceptResult per interval step, in chronological order.\nEach result has deterministic=True because all timestamps are explicit.\n\nUseful for backtesting, historical analysis, and chart data generation.",
        "operationId": "execute_range_execute_range_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExecuteRangeRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "items": {
                    "$ref": "#/components/schemas/ConceptResult"
                  },
                  "type": "array",
                  "title": "Response Execute Range Execute Range Post"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute/async": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Enqueue an async concept execution job",
        "description": "Enqueue a concept execution job and return immediately.\n\nThe response contains a job_id — poll GET /jobs/{job_id} at the\nreturned poll_interval_seconds to retrieve the result once the job\nreaches status='completed'.\n\nUse for long-running executions or when synchronous latency is\nunacceptable. The job executes the same path as POST /execute.\n\nReturns HTTP 202 Accepted — the job is queued, not yet complete.",
        "operationId": "execute_async_execute_async_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExecuteRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "202": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Job"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute/graph": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Execute a pre-compiled graph",
        "description": "Execute a pre-compiled execution graph by graph_id.\n\nBypasses the compilation step — use on the hot path: compile once at\nstartup, cache graph_id, then call this endpoint on every evaluation.\n\nir_hash — if provided, verified against the stored graph before execution.\nMismatch → HTTP 409 (stale graph_id in caller; recompile and update cache).\n\nRequires elevated key (X-Elevated-Key header) → HTTP 403 if absent.\n\nHTTP 403 — elevated key missing or invalid.\nHTTP 404 — graph_id not found.\nHTTP 409 — ir_hash mismatch.",
        "operationId": "execute_graph_execute_graph_post",
        "parameters": [
          {
            "name": "x-elevated-key",
            "in": "header",
            "required": false,
            "schema": {
              "anyOf": [
                {
                  "type": "string"
                },
                {
                  "type": "null"
                }
              ],
              "title": "X-Elevated-Key"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExecuteGraphRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ConceptResult"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute/static": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Evaluate a condition with inline data (test-only)",
        "description": "Evaluate a registered condition using caller-supplied primitive values.\n\nNo real data connectors or memintel_config.yaml entries are needed.\nCompiles the linked concept on the fly, evaluates it with the provided\ndata dict, then runs the condition strategy.\n\nThis endpoint is for local testing only — it does not require auth and\nbypasses the production data pipeline entirely.\n\nReturns the DecisionValue as a JSON object.",
        "operationId": "execute_static_execute_static_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/StaticExecuteRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "title": "Response Execute Static Execute Static Post"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/execute": {
      "post": {
        "tags": [
          "Execution",
          "Execution"
        ],
        "summary": "Execute a concept for an entity",
        "description": "Run ψ layer execution for a single entity.\n\nReturns a ConceptResult. timestamp controls execution mode:\n  present → deterministic; result.deterministic=True; cached.\n  absent  → snapshot mode; result.deterministic=False; not cached.\n\nexplain=True populates result.explanation (per-node trace).\n\nHTTP 404 — concept or entity not found.\nHTTP 408 — execution timeout.\nHTTP 422 — execution error (missing data, null propagation).",
        "operationId": "execute_execute_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExecuteRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ConceptResult"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/compile/semantic": {
      "post": {
        "tags": [
          "Compiler",
          "Compiler"
        ],
        "summary": "Produce the semantic view of a concept",
        "description": "Produce a SemanticGraph from a concept definition without compiling.\n\nReturns a stable semantic_hash suitable for deduplication and equivalence\ndetection. Two concepts with the same semantic_hash are semantically\nequivalent — they compute the same function.\n\nDoes NOT persist anything.\n\nHTTP 400 — validation errors.\nHTTP 422 — type errors.",
        "operationId": "compile_semantic_compile_semantic_post",
        "parameters": [
          {
            "name": "x-elevated-key",
            "in": "header",
            "required": false,
            "schema": {
              "anyOf": [
                {
                  "type": "string"
                },
                {
                  "type": "null"
                }
              ],
              "title": "X-Elevated-Key"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CompileSemanticRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SemanticGraph"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/compile/explain-plan": {
      "post": {
        "tags": [
          "Compiler",
          "Compiler"
        ],
        "summary": "Explain the execution plan for a concept",
        "description": "Return the execution plan for a concept without compiling or executing.\n\nEquivalent to SQL EXPLAIN — returns execution_order, parallelizable_groups,\nprimitive_fetches, and critical_path_length. Does NOT persist anything.\n\nUse to understand execution structure before committing a compile.\n\nHTTP 400 — validation errors.\nHTTP 422 — type errors.",
        "operationId": "compile_explain_plan_compile_explain_plan_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ExplainPlanRequest"
              }
            }
          },
          "required": true
