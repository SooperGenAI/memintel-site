      }
    },
    "/compile/graphs/{graph_id}": {
      "get": {
        "tags": [
          "Compiler",
          "Compiler"
        ],
        "summary": "Get a stored execution graph",
        "description": "Retrieve a stored execution graph by graph_id.\n\nUse to inspect the compiled IR or to obtain the ir_hash for audit\nverification. Pass graph_id to POST /execute/graph for execution.\n\nHTTP 404 — graph not found.",
        "operationId": "get_graph_compile_graphs__graph_id__get",
        "parameters": [
          {
            "name": "graph_id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "title": "Graph Id"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ExecutionGraph"
