              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
    "/compile": {
      "post": {
        "tags": [
          "Compiler",
          "Compiler"
        ],
        "summary": "Compile a concept to an execution graph",
        "description": "Validate, compile, and store a concept as an ExecutionGraph.\n\nReturns the stored ExecutionGraph with a stable graph_id and ir_hash.\nThe graph is stored in the execution_graphs table and can be retrieved\nby graph_id via GET /compile/graphs/{graph_id} or executed via\nPOST /execute/graph.\n\nGraph replacement invariant:\n  Recompiling an unchanged definition produces the same ir_hash.\n  If the existing graph has a different ir_hash → HTTP 409.\n\nHTTP 400 — validation errors in concept definition.\nHTTP 404 — referenced primitive or feature not found.\nHTTP 409 — ir_hash mismatch on recompile (CompilerInvariantError).\nHTTP 422 — type errors detected by type checker.",
        "operationId": "compile_concept_compile_post",
        "parameters": [
          {
            "name": "x-elevated-key",
            "in": "header",
            "required": false,
            "schema": {
              "anyOf": [
                {
                  "type": "string"
                },
                {
                  "type": "null"
                }
              ],
              "title": "X-Elevated-Key"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CompileRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ExecutionGraph"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    },
